services:
  - type: web
    name: cipa-sugestoes
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admincipa
      - key: ADMIN_PASSWORD
        sync: false
      - key: PUBLIC_URL
        value: https://cipa-animalia.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        value: https://ecalkwqqydkrhcjbyzhq.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: cipa-anexos
