services:
  - type: web
    name: cipa-sugestoes
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    disk:
      name: cipa-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: DATA_DIR
        value: /var/data
      - key: BACKUP_DIR
        value: /var/data/backups
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admincipa
      - key: ADMIN_PASSWORD
        sync: false
      - key: PUBLIC_URL
        sync: false
